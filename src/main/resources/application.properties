spring.application.name=no-home

# Local defaults are examples only. Override with environment variables, the gitignored
# root .env file, or a gitignored application-local.properties file.
spring.config.import=optional:file:.env[.properties],optional:classpath:application-local.properties,optional:file:./config/application-local.properties

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/no_home?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:no_home}
spring.datasource.password=${DB_PASSWORD:no_home_dev_password}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:2000}

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:mappers/**/*.xml

spring.sql.init.mode=${SQL_INIT_MODE:never}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

public-data.service-key=${PUBLIC_DATA_SERVICE_KEY:}
kakao.map.api-key=${KAKAO_MAP_API_KEY:}
kakao.map.javascript-key=${VITE_KAKAO_MAP_API_KEY:${KAKAO_MAP_API_KEY:}}

auth.jwt.secret=${JWT_SECRET:no-home-local-development-jwt-secret-change-me-32bytes}
auth.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:900}
auth.jwt.refresh-token-seconds=${JWT_REFRESH_TOKEN_SECONDS:604800}
auth.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}

notice.admin-emails=${NOTICE_ADMIN_EMAILS:admin@nohome.local,admin@example.com}

# Spring AI (OpenAI via SSAFY GMS proxy). Key injected from environment (.env).
spring.ai.openai.api-key=${SSAFY_GMS_API_KEY:}
spring.ai.openai.base-url=${SSAFY_GMS_OPENAI_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/}
spring.ai.openai.chat.completions-path=chat/completions
spring.ai.openai.chat.options.model=${AI_CHAT_MODEL:gpt-4o-mini}
spring.ai.tools.throw-exception-on-error=true
spring.ai.retry.max-attempts=${AI_CHAT_RETRY_MAX_ATTEMPTS:2}

# AI chat request policy. Spring AI uses Boot's auto-configured RestClient.Builder.
spring.http.client.connect-timeout=${AI_CHAT_CONNECT_TIMEOUT:3s}
spring.http.client.read-timeout=${AI_CHAT_READ_TIMEOUT:25s}
ai.chat.max-message-length=${AI_CHAT_MAX_MESSAGE_LENGTH:500}
ai.chat.rate-limit.enabled=${AI_CHAT_RATE_LIMIT_ENABLED:true}
ai.chat.rate-limit.requests=${AI_CHAT_RATE_LIMIT_REQUESTS:10}
ai.chat.rate-limit.window=${AI_CHAT_RATE_LIMIT_WINDOW:1m}

# AI diagnostics are secure-by-default. The optional advisor logs counts/token usage only,
# never prompt, response, tool input/result, member identity, or provider error bodies.
ai.chat.logging.diagnostics-enabled=${AI_CHAT_DIAGNOSTIC_LOGGING_ENABLED:false}
logging.level.com.ssafy.home.ai=${AI_CHAT_LOG_LEVEL:INFO}
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=${AI_CHAT_DIAGNOSTIC_LOG_LEVEL:OFF}
