# 운영(prod) 프로필 보안 설정 — fail-closed.
# 개발 기본값 fallback을 제거해, 보안값 누락 시 기동을 실패시킨다.
# (set-but-weak 값과 비-Secure 쿠키는 ProductionSecurityValidator가 추가로 차단)

# JWT_SECRET 미설정 시 placeholder 미해소로 기동 실패(fallback 없음).
auth.jwt.secret=${JWT_SECRET}

# 운영 기본 Secure 쿠키.
auth.jwt.cookie-secure=${JWT_COOKIE_SECURE:true}
